servers:
  feed:
    host: "127.0.0.1"
    port: 3000
    transport: WS
    engineIoTransport: WEBSOCKET_OR_POLLING
    auth: NONE
    spillRootPath: ".feed-spill"
    namespaces:
      - path: /feed
        topics:
          - snapshot
          - delta
        deliveryMode: BEST_EFFORT
        overflowAction: DROP_OLDEST
        maxQueuedMessagesPerClient: 128
        maxQueuedBytesPerClient: 1048576
        ackTimeoutMs: 2000
        maxRetries: 0
        coalesce: false
        allowPolling: true
        maxInFlight: 1
        authRequired: false
  control:
    port: 3001
    namespaces:
      - path: /commands
        topics:
          - send
          - cancel
        deliveryMode: AT_LEAST_ONCE
        overflowAction: REJECT_NEW
        maxRetries: 5
        ackTimeoutMs: 2000
        maxInFlight: 2
